<!--
  Hollow · Road Scene
  ───────────────────

  CONTAINER SIZING
  The scene fills its parent via width/height:100% with a min-height:540px
  safety net. Wrap it in a sized container:

    <div style="height:100vh">
      <div class="hollow-road"></div>
    </div>

  Fixed aspect ratio or a CSS grid cell work equally well.

  CONTINUE HOOK
  When all three hotspots are clicked the continue button appears. Clicking
  it dispatches a bubbling CustomEvent on the .hollow-road element:

    document.querySelector('.hollow-road').addEventListener(
      'hollow:continue',
      () => { /* navigate to Car Radio screen */ }
    );

  MULTIPLE INSTANCES
  initRoadScene() runs against every .hollow-road on the page at load time,
  so you can mount more than one scene without any extra setup.

  NO GLOBALS
  All CSS is namespaced under .hollow-road. The script runs inside an IIFE
  and attaches nothing to window.

  STATE IS INTERNAL
  reveal(key) is scoped inside each initRoadScene() call. To expose it for
  testing or external control, attach it to the root element inside
  initRoadScene — e.g. root._reveal = reveal — then call it from the
  console or a test harness.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
  rel="stylesheet">

<div class="hollow-road"></div>

<style>
.hollow-road {
  --hr-bg: #050804;
  --hr-fg: #e0d5c0;
  --hr-amber: #c4813a;
  --hr-amber-bright: #f0b25e;
  --hr-amber-glow: rgba(196, 129, 58, .55);

  position: relative;
  width: 100%;
  height: 100%;
  min-height: 540px;
  background: var(--hr-bg);
  overflow: hidden;
  font-family: 'Special Elite', cursive;
  color: var(--hr-fg);
}

/* Film grain */
.hollow-road::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 90;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
  background-size: 150px;
  opacity: .35;
  mix-blend-mode: overlay;
}

/* Stars */
.hollow-road .hr-star {
  position: absolute;
  border-radius: 50%;
  background: var(--hr-fg);
  animation: hr-pulse 3s ease-in-out infinite;
  pointer-events: none;
}

/* Road perspective */
.hollow-road .hr-road {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 55%;
  background: linear-gradient(to top, #181814 0%, #0e0e0c 55%, transparent 100%);
  clip-path: polygon(32% 0%, 68% 0%, 100% 100%, 0% 100%);
  pointer-events: none;
}

/* Center dashes */
.hollow-road .hr-dash {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: var(--hr-amber);
  pointer-events: none;
}

/* Trees */
.hollow-road .hr-trees {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 75%;
  pointer-events: none;
}

/* Fog */
.hollow-road .hr-fog-layer {
  position: absolute;
  inset: -25%;
  pointer-events: none;
}
.hollow-road .hr-fog-layer:nth-child(1) { animation: hr-drift 20s ease-in-out infinite; }
.hollow-road .hr-fog-layer:nth-child(2) { animation: hr-drift2 25s ease-in-out infinite; animation-delay: -5s; }
.hollow-road .hr-fog-layer:nth-child(3) { animation: hr-drift 17s ease-in-out infinite; animation-delay: -10s; }
.hollow-road .hr-fog-layer:nth-child(4) { animation: hr-drift2 30s ease-in-out infinite; animation-delay: -15s; }

/* Hotspots */
.hollow-road .hr-hotspot {
  position: absolute;
  cursor: pointer;
  transition: filter .35s ease;
  z-index: 10;
}
.hollow-road .hr-hotspot:hover {
  filter:
    drop-shadow(0 0 6px rgba(196, 129, 58, .65))
    drop-shadow(0 0 14px rgba(196, 129, 58, .3));
}
.hollow-road .hr-hotspot::after {
  content: attr(data-hint);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Special Elite', cursive;
  font-size: 12px;
  letter-spacing: .08em;
  color: var(--hr-amber);
  white-space: nowrap;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0;
  transition: opacity .25s;
}
.hollow-road .hr-hotspot:hover::after { opacity: 1; }
.hollow-road .hr-hotspot[data-revealed='true']::after { content: ''; }

/* Pulsing dot indicator inside hotspots */
.hollow-road .hr-pulse-dot {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--hr-amber-glow);
  box-shadow: 0 0 14px 4px rgba(196, 129, 58, .25);
  transform: translate(-50%, -50%);
  animation: hr-pulse 2.4s ease-in-out infinite;
  pointer-events: none;
}
.hollow-road .hr-hotspot[data-revealed='true'] .hr-pulse-dot {
  display: none;
}

/* Vanishing point */
.hollow-road .hr-hotspot--vanishing {
  bottom: 46%;
  left: 50%;
  transform: translateX(-50%);
  width: 54px;
  height: 54px;
  border-radius: 50%;
}

/* Treeline */
.hollow-road .hr-hotspot--treeline {
  bottom: 8%;
  left: 4%;
  width: 18%;
  height: 52%;
  border-radius: 6px;
}
.hollow-road .hr-hotspot--treeline .hr-pulse-dot {
  top: 12%;
  left: 52%;
}

/* Mile marker sign */
.hollow-road .hr-hotspot--marker {
  bottom: 11%;
  left: 29%;
  width: 46px;
  height: 78px;
}
.hollow-road .hr-marker-svg {
  width: 100%;
  height: 100%;
  display: block;
}
.hollow-road .hr-marker-num {
  fill: rgba(255, 210, 140, .85);
  filter: drop-shadow(0 0 4px rgba(196, 129, 58, .5));
  transition: fill .4s, filter .4s;
}
.hollow-road .hr-hotspot--marker[data-revealed='true'] .hr-marker-num {
  fill: rgba(224, 213, 192, .55);
  filter: none;
}

/* Narrative */
.hollow-road .hr-narrative {
  position: absolute;
  top: 44px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 20;
  padding: 0 40px;
  pointer-events: none;
}
.hollow-road .hr-narrative-inner {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(17px, 2.2vw, 23px);
  line-height: 1.8;
  color: rgba(224, 213, 192, .82);
  max-width: 560px;
  margin: 0 auto;
  min-height: 4.5em;
}
.hollow-road .hr-line {
  animation: hr-rise .8s ease both;
}
.hollow-road .hr-prompt {
  font-family: 'Special Elite', cursive;
  font-style: normal;
  font-size: 13px;
  letter-spacing: .34em;
  color: rgba(196, 129, 58, .45);
  text-transform: uppercase;
  animation: hr-pulse-soft 3.4s ease-in-out infinite;
}

/* Continue button */
.hollow-road .hr-continue-wrap {
  position: absolute;
  bottom: 36px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 20;
}
.hollow-road .hr-continue {
  display: inline-block;
  padding: 13px 32px;
  border: 1px solid var(--hr-amber);
  font-family: 'Special Elite', cursive;
  font-size: 14px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--hr-amber);
  cursor: pointer;
  background: transparent;
  transition: border-color .3s, color .3s;
  animation: hr-rise .9s ease both;
}
.hollow-road .hr-continue:hover {
  border-color: var(--hr-amber-bright);
  color: var(--hr-amber-bright);
}

/* Animations */
@keyframes hr-pulse       { 0%, 100% { opacity: .5 } 50% { opacity: 1  } }
@keyframes hr-pulse-soft  { 0%, 100% { opacity: .5 } 50% { opacity: .9 } }
@keyframes hr-drift       { 0%, 100% { transform: translate(0, 0)        } 50% { transform: translate(3%, -1.5%)          } }
@keyframes hr-drift2      { 0%, 100% { transform: translateX(0) scaleX(1)} 50% { transform: translateX(-4%) scaleX(1.06)  } }
@keyframes hr-rise        { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
</style>

<script>
(function () {
  const ROOT_SELECTOR = '.hollow-road';
  document.querySelectorAll(ROOT_SELECTOR).forEach(initRoadScene);

  function initRoadScene(root) {
    // ── Config ──────────────────────────────────────────────
    const TREES = [
      { x: -1, h: 55, w: 9, dark: true  }, { x:  4, h: 42, w: 7, dark: false },
      { x: 10, h: 62, w: 8, dark: true  }, { x: 16, h: 38, w: 6, dark: false },
      { x: 22, h: 50, w: 8, dark: true  }, { x: 68, h: 58, w: 8, dark: true  },
      { x: 75, h: 44, w: 7, dark: false }, { x: 81, h: 65, w: 9, dark: true  },
      { x: 88, h: 40, w: 7, dark: false }, { x: 93, h: 52, w: 8, dark: true  },
    ];
    const STAR_COUNT = 40;
    const FOG_DENSITY = 1.2;
    const FOG_LAYERS = [
      { x: 50, y: 62, w: 85,  h: 45, op: 0.07 },
      { x: 28, y: 72, w: 70,  h: 38, op: 0.06 },
      { x: 72, y: 55, w: 90,  h: 50, op: 0.05 },
      { x: 45, y: 80, w: 100, h: 55, op: 0.08 },
    ];
    const LINES = {
      marker: 'Mile marker 7',
      trees:  'The trees are bigger than expected',
      sign:   'Revelstoke. 3 miles. The sign needs repainting',
    };

    const state = { marker: false, trees: false, sign: false };

    // ── Build static scene ──────────────────────────────────
    let html = '';

    // Stars
    for (let i = 0; i < STAR_COUNT; i++) {
      const big = i % 6 === 0;
      const size = big ? 2 : 1;
      const left = (i * 41.3 + 7) % 100;
      const top  = (i * 27.1 + 3) % 55;
      const opacity = 0.3 + (i % 4) * 0.15;
      const dur = 2.5 + (i % 5) * 0.5;
      const delay = (i * 0.18) % 4;
      html += `<div class="hr-star" style="
        width:${size}px;height:${size}px;
        left:${left}%;top:${top}%;
        opacity:${opacity};
        animation-duration:${dur}s;animation-delay:${delay}s;"></div>`;
    }

    // Road
    html += `<div class="hr-road"></div>`;

    // Center dashes
    for (let i = 0; i < 5; i++) {
      html += `<div class="hr-dash" style="
        bottom:${8 + i * 7}%;
        width:${2 + i * 0.5}px;
        height:${2 + i}%;
        opacity:${0.25 - i * 0.04};"></div>`;
    }

    // Trees (single SVG)
    const treesInner = TREES.map(({ x, h, w, dark }) => {
      const y = 100 - h;
      const c  = dark ? 'rgba(3,7,2,0.95)'  : 'rgba(7,14,5,0.9)';
      const c2 = dark ? 'rgba(5,10,3,0.92)' : 'rgba(10,18,7,0.88)';
      return `
        <polygon points="${x+w/2},${y} ${x+w*0.05},${y+h*0.32} ${x+w*0.95},${y+h*0.32}" fill="${c}"/>
        <polygon points="${x+w/2},${y+h*0.18} ${x-w*0.08},${y+h*0.52} ${x+w*1.08},${y+h*0.52}" fill="${c2}"/>
        <polygon points="${x+w/2},${y+h*0.38} ${x-w*0.12},${y+h*0.76} ${x+w*1.12},${y+h*0.76}" fill="${c}"/>
        <rect x="${x+w*0.42}" y="${y+h*0.74}" width="${w*0.16}" height="${h*0.26}" fill="${c2}"/>`;
    }).join('');
    html += `<svg class="hr-trees" viewBox="0 0 100 100" preserveAspectRatio="none">${treesInner}</svg>`;

    // Fog
    FOG_LAYERS.forEach(l => {
      html += `<div class="hr-fog-layer" style="background:
        radial-gradient(ellipse ${l.w}% ${l.h}% at ${l.x}% ${l.y}%,
        rgba(140,160,128,${l.op * FOG_DENSITY}) 0%, transparent 65%);"></div>`;
    });

    // Hotspots
    html += `
      <div class="hr-hotspot hr-hotspot--vanishing" data-key="sign" data-hint="down the road">
        <div class="hr-pulse-dot"></div>
      </div>
      <div class="hr-hotspot hr-hotspot--treeline" data-key="trees" data-hint="the trees">
        <div class="hr-pulse-dot"></div>
      </div>
      <div class="hr-hotspot hr-hotspot--marker" data-key="marker" data-hint="roadside marker">
        <svg class="hr-marker-svg" viewBox="0 0 46 78">
          <rect x="21" y="32" width="4"   height="44" fill="#1a1208"/>
          <rect x="21" y="32" width="1.5" height="44" fill="rgba(196,129,58,.18)"/>
          <path d="M6,30 L40,30 L40,12 Q40,6 33,6 L13,6 Q6,6 6,12 Z"
                fill="#1c1408" stroke="rgba(196,129,58,.7)" stroke-width="1"/>
          <text x="23" y="13" text-anchor="middle"
                font-family="'Courier Prime', monospace"
                font-size="3.5" fill="rgba(196,129,58,.55)">MI</text>
          <text class="hr-marker-num" x="23" y="26" text-anchor="middle"
                font-family="'Special Elite', cursive"
                font-size="18">7</text>
        </svg>
      </div>`;

    // Narrative + continue slot
    html += `
      <div class="hr-narrative"><div class="hr-narrative-inner"></div></div>
      <div class="hr-continue-wrap"></div>`;

    root.innerHTML = html;

    // ── Interactions ────────────────────────────────────────
    const narrativeInner = root.querySelector('.hr-narrative-inner');
    const contWrap = root.querySelector('.hr-continue-wrap');

    function renderNarrative() {
      const any = state.marker || state.trees || state.sign;
      if (!any) {
        narrativeInner.innerHTML = `<div class="hr-prompt">look around</div>`;
        return;
      }
      narrativeInner.innerHTML = ['marker', 'trees', 'sign']
        .filter(k => state[k])
        .map(k => `<div class="hr-line">${LINES[k]}</div>`)
        .join('');
    }
    renderNarrative();

    function showContinueButton() {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'hr-continue';
      btn.textContent = 'DRIVE INTO REVELSTOKE →';
      btn.addEventListener('click', () => {
        root.dispatchEvent(new CustomEvent('hollow:continue', { bubbles: true }));
      });
      contWrap.replaceChildren(btn);
    }

    function reveal(key) {
      if (state[key]) return;
      state[key] = true;
      const spot = root.querySelector(`.hr-hotspot[data-key="${key}"]`);
      if (spot) spot.setAttribute('data-revealed', 'true');
      renderNarrative();
      if (state.marker && state.trees && state.sign) showContinueButton();
    }

    root.querySelectorAll('.hr-hotspot').forEach(spot => {
      spot.addEventListener('click', () => reveal(spot.dataset.key));
    });
  }
})();
</script>
