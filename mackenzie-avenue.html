<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow — Mackenzie Avenue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body {
    transition: opacity 0.7s ease;
    animation: ma-fadein 0.8s ease both;
  }

  @keyframes ma-fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Scene container — locked to 16:9 ──────────── */

  #scene {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
  }

  #scene > img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /* ── Hotspot layer ──────────────────────────────── */

  #room {
    position: absolute;
    inset: 0;
    z-index: 4;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }

  #room.active {
    opacity: 1;
    pointer-events: auto;
  }

  .hotspot {
    position: absolute;
    cursor: pointer;
  }

  /* ── Intro text ─────────────────────────────────── */

  #intro {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: rgba(0, 0, 0, 0.65);
    transition: opacity 0.8s ease;
  }

  #intro p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(15px, 1.8vw, 19px);
    line-height: 1.85;
    color: #e0d5c0;
    text-align: center;
  }

  /* ── Popup overlay ──────────────────────────────── */

  .popup-overlay {
    position: fixed;
    inset: 0;
    z-index: 800;
    background: rgba(4, 7, 3, 0.93);
    display: none;
    align-items: center;
    justify-content: center;
    animation: popup-fade 0.4s ease;
  }
  .popup-overlay.open { display: flex; }

  .popup-card {
    max-width: 460px;
    width: 90%;
    padding: 48px;
    border: 1px solid rgba(196, 129, 58, 0.25);
    text-align: center;
    background: transparent;
  }

  .popup-label {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: #c4813a;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .popup-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(19px, 2.7vw, 25px);
    line-height: 1.7;
    color: #e0d5c0;
  }

  .popup-text--atmo {
    font-size: clamp(15px, 1.8vw, 19px);
    line-height: 1.85;
  }

  .popup-close {
    margin-top: 32px;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: rgba(224, 213, 192, 0.3);
    cursor: pointer;
    text-transform: uppercase;
    display: inline-block;
    background: transparent;
    border: 0;
    font-family: 'Courier Prime', monospace;
    transition: color 0.25s;
    outline: none;
  }
  .popup-close:hover { color: #c4813a; }
  button:focus { outline: none; }

  @keyframes popup-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  </style>
</head>
<body>

  <div id="scene">
    <img src="mackenzie-avenue.png" alt="">

    <div id="room">

      <div class="hotspot" id="hs-gap"
           style="left:26.5%;top:54%;width:16%;height:32%"></div>

      <div class="hotspot" id="hs-dish"
           style="left:9.5%;top:9%;width:10%;height:16%"></div>

      <div class="hotspot" id="hs-hardware"
           style="left:2%;top:31%;width:22%;height:20%"></div>

      <div class="hotspot" id="hs-diner"
           style="left:78%;top:44%;width:21%;height:16%"></div>

      <div class="hotspot" id="hs-truck"
           style="left:65%;top:68%;width:33%;height:27%"></div>

      <div class="hotspot" id="hs-mountain"
           style="left:26%;top:1%;width:46%;height:42%"></div>

    </div>

    <div id="intro">
      <p>Four days since anyone last saw June Rees.<br>Someone in this street knows where she went.</p>
    </div>
  </div>

  <div class="popup-overlay" id="popup" role="dialog" aria-modal="true">
    <div class="popup-card">
      <div class="popup-label" id="popupLabel"></div>
      <div class="popup-text"  id="popupText"></div>
      <button class="popup-close" id="popupClose" type="button">[ close ]</button>
    </div>
  </div>

  <script>
  (function () {
    const intro = document.getElementById('intro');
    const room  = document.getElementById('room');

    setTimeout(() => {
      intro.style.opacity = '0';
      intro.addEventListener('transitionend', () => {
        intro.remove();
        room.classList.add('active');
      }, { once: true });
    }, 2500);
  })();
  </script>

  <script>
  (function () {

    const HOTSPOTS = {
      'hs-gap': {
        type:  'evidence',
        label: 'The Gap',
        text:  'Stone pillars. Something stood here once. The town does not talk about what.'
      },
      'hs-dish': {
        type:  'evidence',
        label: 'The Dish',
        text:  'A dish-shaped aerial, bolted to the roof of the hardware store. Bigger than the ones on the houses. It points up the valley, at the mountain.',
        flag:  'saw_dish'
      },
      'hs-hardware': {
        type: 'atmo',
        text: 'REES HARDWARE. The lights are off. It has been six months since anyone opened it. A torn calendar still hangs in the window — October 1955.',
        flag: 'saw_date'
      },
      'hs-truck': {
        type: 'atmo',
        text: '1949 Ford pickup. Good condition. Local plates. The bed has mud on it — mountain mud, darker than the valley soil.'
      },
      'hs-mountain': {
        type: 'conditional',
        flagsRequired: ['saw_dish', 'saw_date'],
        textBefore: "The Selkirks. They've been there longer than the town, longer than the province, longer than the country.",
        textAfter: "The Selkirks. They've been there longer than the town, longer than the province, longer than the country. You keep looking anyway.",
        flagOnSuccess: 'noticed_dish_contradiction'
      },
      'hs-diner': {
        type: 'nav',
        url:  'diner.html'
      }
    };

    const popup   = document.getElementById('popup');
    const labelEl = document.getElementById('popupLabel');
    const textEl  = document.getElementById('popupText');
    const closeBtn = document.getElementById('popupClose');

    function setFlag(name) {
      try {
        const raw  = localStorage.getItem('hollow_save');
        const data = raw ? JSON.parse(raw) : {};
        data.flags = data.flags || {};
        data.flags[name] = true;
        localStorage.setItem('hollow_save', JSON.stringify(data));
      } catch (e) {}
    }

    function getFlag(name) {
      try {
        const raw  = localStorage.getItem('hollow_save');
        const data = raw ? JSON.parse(raw) : {};
        return !!(data.flags && data.flags[name]);
      } catch (e) { return false; }
    }

    function openPopup(id) {
      const data = HOTSPOTS[id];
      if (!data) return;

      if (data.type === 'nav') {
        navigateTo(data.url);
        return;
      }

      if (data.type === 'conditional') {
        const allMet = data.flagsRequired.every(f => getFlag(f));
        if (allMet) setFlag(data.flagOnSuccess);
        labelEl.style.display = 'none';
        textEl.className      = 'popup-text popup-text--atmo';
        textEl.textContent    = allMet ? data.textAfter : data.textBefore;
        popup.classList.add('open');
        closeBtn.focus();
        return;
      }

      if (data.flag) setFlag(data.flag);

      if (data.type === 'evidence') {
        labelEl.textContent   = data.label;
        labelEl.style.display = '';
        textEl.className      = 'popup-text';
      } else {
        labelEl.style.display = 'none';
        textEl.className      = 'popup-text popup-text--atmo';
      }

      textEl.textContent = data.text;
      popup.classList.add('open');
      closeBtn.focus();
    }

    function closePopup() {
      popup.classList.remove('open');
    }

    function navigateTo(url) {
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = url; }, 700);
    }

    document.querySelectorAll('.hotspot').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        openPopup(el.id);
      });
    });

    closeBtn.addEventListener('click', closePopup);
    popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && popup.classList.contains('open')) closePopup();
    });

  })();
  </script>

</body>
</html>
